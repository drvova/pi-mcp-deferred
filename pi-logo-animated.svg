<svg width="360" height="340" viewBox="0 0 360 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated Pi-style Tetris logo">
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="#8094AA" stroke-opacity="0.085" stroke-width="1"/>
    </pattern>

    <pattern id="bigGrid" width="150" height="150" patternUnits="userSpaceOnUse">
      <path d="M150 0H0V150" fill="none" stroke="#8094AA" stroke-opacity="0.13" stroke-width="1"/>
    </pattern>

    <radialGradient id="glow" cx="50%" cy="50%" r="58%">
      <stop offset="0%" stop-color="#5A7896" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#5A7896" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="26">
      <stop offset="0%" stop-color="#70849E"/>
      <stop offset="52%" stop-color="#53677F"/>
      <stop offset="100%" stop-color="#3C4D63"/>
    </linearGradient>

    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="26">
      <stop offset="0%" stop-color="#AD6046"/>
      <stop offset="52%" stop-color="#8D422D"/>
      <stop offset="100%" stop-color="#682F22"/>
    </linearGradient>

    <linearGradient id="oliveGrad" x1="0" y1="0" x2="0" y2="26">
      <stop offset="0%" stop-color="#BFC08F"/>
      <stop offset="52%" stop-color="#A3A36B"/>
      <stop offset="100%" stop-color="#7B7C50"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="3" dy="4" stdDeviation="0" flood-color="#000000" flood-opacity="0.18"/>
    </filter>

    <style>
      .drop {
        opacity: 0;
        animation: dropIn 520ms cubic-bezier(.2,.8,.2,1.08) forwards;
      }

      .d1 { animation-delay: 40ms; }
      .d2 { animation-delay: 90ms; }
      .d3 { animation-delay: 140ms; }
      .d4 { animation-delay: 230ms; }
      .d5 { animation-delay: 310ms; }
      .d6 { animation-delay: 390ms; }
      .d7 { animation-delay: 470ms; }
      .d8 { animation-delay: 550ms; }
      .d9 { animation-delay: 630ms; }
      .d10 { animation-delay: 710ms; }

      @keyframes dropIn {
        from {
          opacity: 0;
          y: -42px;
        }
        72% {
          opacity: 1;
        }
        to {
          opacity: 1;
          y: 0px;
        }
      }
    </style>

    <g id="blueBlock">
      <rect width="26" height="26" fill="url(#blueGrad)" stroke="#03080E" stroke-opacity="0.62"/>
      <rect x="2" y="2" width="22" height="3" fill="#FFFFFF" fill-opacity="0.13"/>
      <rect x="2" y="2" width="3" height="22" fill="#FFFFFF" fill-opacity="0.10"/>
      <rect x="21" y="4" width="3" height="20" fill="#000000" fill-opacity="0.17"/>
      <rect x="4" y="21" width="20" height="3" fill="#000000" fill-opacity="0.17"/>
      <line x1="4" y1="13" x2="22" y2="13" stroke="#FFFFFF" stroke-opacity="0.08"/>
    </g>

    <g id="redBlock">
      <rect width="26" height="26" fill="url(#redGrad)" stroke="#03080E" stroke-opacity="0.62"/>
      <rect x="2" y="2" width="22" height="3" fill="#FFFFFF" fill-opacity="0.13"/>
      <rect x="2" y="2" width="3" height="22" fill="#FFFFFF" fill-opacity="0.10"/>
      <rect x="21" y="4" width="3" height="20" fill="#000000" fill-opacity="0.17"/>
      <rect x="4" y="21" width="20" height="3" fill="#000000" fill-opacity="0.17"/>
      <line x1="4" y1="13" x2="22" y2="13" stroke="#FFFFFF" stroke-opacity="0.08"/>
    </g>

    <g id="oliveBlock">
      <rect width="26" height="26" fill="url(#oliveGrad)" stroke="#03080E" stroke-opacity="0.62"/>
      <rect x="2" y="2" width="22" height="3" fill="#FFFFFF" fill-opacity="0.13"/>
      <rect x="2" y="2" width="3" height="22" fill="#FFFFFF" fill-opacity="0.10"/>
      <rect x="21" y="4" width="3" height="20" fill="#000000" fill-opacity="0.17"/>
      <rect x="4" y="21" width="20" height="3" fill="#000000" fill-opacity="0.17"/>
      <line x1="4" y1="13" x2="22" y2="13" stroke="#FFFFFF" stroke-opacity="0.08"/>
    </g>
  </defs>

  <rect width="360" height="340" fill="#111B26"/>
  <rect width="360" height="340" fill="url(#grid)"/>
  <rect width="360" height="340" fill="url(#bigGrid)" opacity="0.45"/>
  <rect width="360" height="340" fill="url(#glow)"/>

  <g transform="translate(132 133)" filter="url(#shadow)">
    <g transform="translate(0 0)"><g class="drop d1"><use href="#blueBlock"/></g></g>
    <g transform="translate(28 0)"><g class="drop d2"><use href="#blueBlock"/></g></g>
    <g transform="translate(56 0)"><g class="drop d3"><use href="#blueBlock"/></g></g>

    <g transform="translate(0 28)"><g class="drop d4"><use href="#redBlock"/></g></g>
    <g transform="translate(56 28)"><g class="drop d5"><use href="#blueBlock"/></g></g>

    <g transform="translate(0 56)"><g class="drop d6"><use href="#redBlock"/></g></g>
    <g transform="translate(28 56)"><g class="drop d7"><use href="#redBlock"/></g></g>
    <g transform="translate(84 56)"><g class="drop d9"><use href="#oliveBlock"/></g></g>

    <g transform="translate(0 84)"><g class="drop d8"><use href="#redBlock"/></g></g>
    <g transform="translate(84 84)"><g class="drop d10"><use href="#oliveBlock"/></g></g>
  </g>
</svg>
